# =========================
# HYPRLOCK - CONFIG COMPLETA
# =========================

# Variáveis
$clock = "rgba(cad3f5ff)"
$input_outer = "rgba(cdd6f4ff)"
$input_inner = "rgba(cdd6f4ff)"
$input_font = "rgba(363a4fff)"

# BACKGROUND
background {
    monitor =                 
    path = ~/Imagens/wallpapers/my-neighbor-totoro-sunflowers.png
    blur_passes = 1
    contrast = 0.9
    brightness = 0.85
    vibrancy = 0.17
    vibrancy_darkness = 0
}

# GENERAL
general {
    disable_loading_bar = true
    no_fade_in = false
    immediate_render = true
}

# INPUT FIELD (SENHA)
input-field {
    monitor =
    size = 300, 40
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $input_outer
    inner_color = $input_inner
    font_color = $input_font
    fade_on_empty = true
    placeholder_text = "<i><span foreground='##ffffff99'>🔒 Enter Password</span></i>"
    hide_input = false
    position = 0, 150
    halign = center
    valign = bottom
}

# HORA
label {
    monitor =
    text = cmd[update:1000] date +"%I"
    color = $clock
    font_family = "JetBrainsMono Bold"
    font_size = 180
    position = 0, 150
    halign = center
    valign = center
}

# MINUTO
label {
    monitor =
    text = cmd[update:1000] date +"%M"
    color = $clock
    font_family = "JetBrainsMono Bold"
    font_size = 180
    position = 0, -75
    halign = center
    valign = center
}

# DATA
label {
    monitor =
    text = cmd[update:1000] date +"%a, %b %d"
    color = $clock
    font_family = "JetBrainsMono Bold"
    font_size = 24
    position = 0, 0
    halign = center
    valign = top
}